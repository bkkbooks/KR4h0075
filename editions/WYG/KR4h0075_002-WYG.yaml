body:
  text: 梅花百詠附録元釋明本撰和馮海粟作自香自色自精神察變知機始悟眞梁宋巳前渾未識羲皇而後有斯人兩三蕋得竒偶象南北枝分混沌塵勘破本根𤣥妙處一團清氣一團春見非愰惚夢非神雪後霜前分外眞疎影暗消三弄月半聫凄斷獨吟人歳寒揺落孤根在江驛荒凉往事塵碎嚼幽香清可挹玉奴無復更臨春辨得孤吟為寫神花光何必更傳眞細看古道臨風樹疑是西廂待月人半醉半醒烟外玉欲無欲有雪中塵綠衣起舞羅浮夢知有凡間㡬度春説到幽芳倍爽神更當親見去年眞乾坤一夜開吟骨風雪半山來故人清籟無聲含道氣凌波有歩起香塵知心妙在琴心外三疊盈盈十指春環珮飄飄見谷神㡬生脩得到清眞玉皇案裏三千載青帝宫中第一人羌管有心催造化楚騷無語笑音塵從今不慣羅浮熱冷淡相看萬斛春燦燦飛瓊妙入神風前應欲問其眞暖來東閣詩成趣寒沁孤山鶴喚人酷愛應何行素志生憎徐庾墮嬌塵碧奩對影禁清痩香落枯梢水亦春羞學時粧媚洛神半溪澄碧自疑眞青開椒眼好窺客黃撚蜂鬚冷笑人沉水醒回鴛井夢屏山斷隔馬嵬塵錦窠行樂相思地幾㸃㣲酸薦晚春潛心物理自通神叅透先天面目眞萬古不磨枝上易一華自識畫前人陽明氣象夜亭午静極胚腪曉閣塵三十六宫生意古托開宇宙未成春玉簫起處暗驚神曲暖瑶臺逸韻眞泉石幾年雲冷鶴關山萬里月愁人香凝老樹調風味影落寒窗枕隙塵檀板金樽久岑寂㣲吟不减昔時春忽向林間見玉神或疑眞處又非眞九天靈魄有生意一殿新粧出内人斜照窗紗斜照水半隨風信半隨塵詩翁不解全身痩寫入溪藤萬種春生香不斷暗迷神誰倩逃禪盎所眞漢水弄珠寒照影松風飄袂夜驚人可能讓雪三分白敢掠逰空一㸃塵浩氣騰騰天巳上肯隨花月趂夭春巖谷幽棲獨煉神山靈有意共成眞半枝殘雪定中衲一片野雲方外人作如是觀清淨種照無色界㡬千塵天機尚有寒消息未遣野􅆐啼破春冉冉天風氣逼神吟邉清想亦通眞小窗相對初疑雪明月一來如有人應物現形須變識即空是色總歸塵憑誰問取枝頭意太極圖中字字春目送空山逺駐神似曽相識倍情眞半牀素被鋪寒玉一幅生綃畵美人爽入冰姿欺國色悵隨哀曲黯京塵三郎正愛霓裳舞珍重椒房自惜春花前月下暗凝神一鶴西來訪子眞蒼鬢黯憐姑射面素衣夜怯廣寒人大千世界迷香霧十二樓臺鎻玉塵箇裏𤣥關誰為問如何藏得許多春精采惸惸照水神清孤映出本然眞瓊田萬頃無情夜鐵笛一聲何處人呵凍成吟寒徹骨迎風含笑黯驚塵繁華暗裏誰招得又為明年釀小春一夜風神約海神盡將天巧賦瓊眞烟霜深處埋踪跡水月光中見侶人寳鼎收香清曉夢冰梢掛影絶飛塵放翁憶共芳花晏百榼淋漓滿屋春玉為丰骨水為神探得前村意思眞種在范先誰治講愛從逋後正愁人禹梁深鎻龍跡蜀膝吟餘鶴糶塵猶記石屏曾止渇獻冰分碎一壺春白雲堆裏曉飛神道骨翛然一太真古岸埋香多是雪寒巖欺影四無人因風寄逺愁應老坐雨辭根恨未塵賸欲廵簷賦歸隐共君心事答閒春雪天添得好精神似向瓊寒訴玉真一㸃芳心憑驛使半梢清影伴詩人消沉今古醉中趣葬盡風流痩外塵君若有情終有待肯教空老故園春斷橋斜處挹花神認得花神體態真肯向黄昏求對月未應太白敢驕人冰霜冷面磨堅操鐵石剛腸壓軟塵斗轉參横情耿耿不禁吹􅏒麗譙春誰將幽懶癖心神白石清泉養性真山脚暖融三尺雪林端香引太初人嫩椒綻粉迎先斾老蜜塗黄壓後塵試向静居閑探索六隂極處獨回春征路愁迷黯􅏒神穿林入谷自尋真亭亭有意冷移玉默默無言空悵人夢斷陽臺半雲雨淚空青塚㡬沙塵餘芳消歇繁華起野水蒼烟意自春記得瑶池巳出神浪滔物表快登真東君着意憐深雪午夜吹香動玉人官路野橋應遣興雪階月地不生塵有時空撚青梢憶愁裏狂呼軟脚春淒涼庭館獨棲神疑是廬隂立詠眞一雪不知園裏樹萬妃渾似月中人愁思曉夢徘徊意清隔𤣥都縹緲塵誰道此生羞淡泊最髙寒外有餘春不知若箇主天神放出仙扄一貌真舞袖自憐回雪意横簫應記浣紗人王恭鶴氅還同潔嚴子羊裘未必塵看到夜涼竒絶處不須銀燭照青春鱗鱗蘚樹暗藏神幻得幽香意度真天地中間一清友湖山隱處九原人誰能酌酒歌遺些我獨擕詩弔往塵若使相逄二三月兎葵燕麥亦傷春眼花落井眩雙神雪歩迢迢見欲真淡墨畵圖横玉影黄昏庭院倚䦨人唾絨猶認窗前跡啼粉空餘鏡面塵消得黄金鑄成屋年年雪裏貯芳春曽約菩提一樹神浣花深處共叅真雪深林下維摩室月落岩前面璧人七返九還觀色相三空四諦悟根塵頭頭縱是華嚴界野室孤雲自在春丹青誰為巧傳神延壽雖工未即真日外空居瑶珮影雲邉愁老緑衣人饑蜂冒雪身逰絮病鶴眠苔跡妒塵白玉堂前纔一樹重重門戸不關春江風嵗晚暗傷神忽見南園曉樹真竹外横斜驚木客水邉梳洗妒冰人羞將獺髓明塗臉忍使龍涎暗濕塵吟興巳隨天際去應須踏雪逺尋春風消雪暖氣浮神踏遍苔痕未見真一曲香山半窗月千年華表九霄人檀心逺覺雲情薄玉態回看粉黛塵可惜柴桑無隻字重今遺恨㡬經春江路行行冷襲神不知何地覓𤣥真豈無明月共千里曽對此兄今幾人終古嵗寒堅好友滿空冰雪洗襟塵我還擲筆脩書史名節輸君獨擅春溪光山色曉開神冰柱擎天太逼真清傍小橋低壓雪冷凝隻眼半窺人釵横亂鬢粘雲影玉滑酥融却醉塵何處追逰張歩帳獨嫌純素不描春誰遣東皇太乙神來從花下㑹羣真𤣥裳縞袂雪堂賦玉骨冰姿月殿人静覺寒波嬌入澑動疑香霧細飄塵此身却老清陽景免得兒家一笑春水中仙子鏡中神夜夜相擕入夢真隴鴈哀殘埋玉地朔風吹老弄蟾人寒添灞上䨇眉凍愁壓江南幾屐塵雪裏不嫌情味苦一枝占斷九州春殘紅苞萼半怡神始向窮邉露一真銀錯落中香入酒玉嬋娟外影隨人素襟挽雪情無奈寒鴈凌空不洗塵莫遣年殘惰行色過年猶對物華春紛紛雪月是清神况有揚州句入真傍水似看脩禊事飛鈿應學墮樓人三生石上驚前夢羣玉山頭出世塵空對蔚宗懐陸凱折來不寄一枝春誤將素月比容神强自猜疑恐未真雪裏苔枝迷半樹郵傳香信寄何人子卿對雪寒驚膽蔡琰聞笳恨入塵應向崑山採瓊藥鍊成魂魄傲長春逋仙一去筆無神幾向湖濵憶素真影痩横舒青玉案月香冷浸白衣人霜禽偷眼寒餘在紙帳孤眠絶夢塵我亦清癯心似鐵醉吟新句重憐春天將青白賦姿神自有生來只任真茅舎淒涼閑縱歩玉堂富貴一陳人淡烟斜月籠寒玉流水行雲恨逺塵兀兀窮仙慣憔悴醉眠石枕暗酬春年來嶺嶠獨逰神琪樹林中骨相真曉起白迷煙外策夜深寒醒酒邊人玉環飛燕還驚幻西子王嬙總泣塵爭似枯荄亘今古陽和􅏒處自然春水村雲郭慣馳神閑淡生涯自得真李氏香中半孤影林家鶴外一全人横溪笑我吟心苦隋砌羞渠醉眼塵千種芳菲總凋䘮還因底事獨行春愁歸竹錦謾勞神㡬樹參差意未真雲外逺疑持漢節山深近似避秦人半梢破萼猶疑竚一翅騰空不礙塵多謝化工憐寂寞夜闌畱月伴嬌春瓊林瀟灑儘丰神誰道瑶英敢奪真老眼驚看江上路孤身愁憶隴頭人冷浮岑嶽回新棹清入流篝逐黯塵痩不勝衣雲態嫩闌干月午奈何春夜半霓裳悦羽神寒蟾皎皎露天真山中便覺有詩思江外自來無俗人百斛量珠丸絢色㡬枝鬬綵傲芳塵伊誰錯作梨花夢喚起閑愁斷送春花裏相從問鶴神何當蜕骨似西真八千勇士衝冠氣百萬巔崖辟穀人老去但知雲水癖生來未識綺羅塵幾時心緒渾無事閑却江頭醉晚春横影伶仃似有神半清淺處獨呈真數枝冲淡晚唐句一種孤髙東晉人上苑清房誰耐雪廬山玉峽肯䝉塵是中天趣那能識惜被東風漏洩春憶得年時夢裏神分明自識廣平真嫩寒初透臘前蘂老氣欲騰天上人誰御鉛華掩晴晝肯將縞帯落囂塵深冬勝有生生意粉蝶如知更恨春借問司華后土神向來玉蕋幾分真縞衣香引張帆駕白扇寒遮舉轡人羞淡獨能償素約偷閑未肯沒黄塵狂吟若也天知道痩得天公更怯春俠骨稜稜氣骨神庭前剛被月摹真苔封石壓何年樹雪虐風饕孤節人佳瑞似開鸞羽彩偷姸不襯馬蹄塵粲然玉骨誰同笑忍道靈妃亦訴春霜風吹起半空神綽約仙裳見道真照日不消涼雪豔衝寒欲訪暮山人羅屏翠羃堪圍玉紫陌紅樓敢抗塵幾立溪橋愁正遠暗香清透一腔春山深深處冷搜神羔蕋含枝識幻真吟對痩憐寒夜影折看愁殺故鄉人水雲弄月成三變玉雪吹涼試六塵堪笑插桃評鬼智漆園應是重慚春吟損東溪百倍神謫仙共我寸心真㡬明㡬滅月中魄三沭三薰玉表人雪欲肆欺空亂眼風還薄惡不粘塵杏娼歎自心開元宴應恨孤園早占春夜來曽共洞天神飛向仙都對九真鐵面冷於吹劔客石心深似嗅蘭人枝横月觀瓊瑶珮片落風臺玉粉塵𤣥鶴無聲唳空濶短歌一醉太和春花於雪裏獨稱神㸃出寒珠顆顆真先領一陽來故日應從九地作歸人香中别韻開清境世外髙情作暮塵回顧武陵溪畔客㡬村烟水尚迷春一味由來具一神枯槎獨占木中真形多有意相干月香本無情自動人嶺表冷雲迷遠望江南晴雪掩輕塵千林喚醒幾黄落分付伊初笑領春紛月披風巧照神龍綃半露玉為真冷光自照眼前色癯影欲欺雲外人鳯隻鸞孤情悒獨麝温屏暖景消塵睡棠只解成妖夢未識山間一段春寒勒花遲欲養神青陽早把膽窺真蜂胎蟾魄長生殿玉液金膏得道人變態似同雲出岫背時不與俗同塵洛中紅白誰家女還憶元㣲滿座春夜窗吟入静畱神調䕶風寒問趣真一氣不諧三益友十年又送幾佳人紛紛著樹烟凝雪漠漠浮雲月漾塵乞與徐熙畵新景未應傳得筆頭春自是蓬壺陸地神黃雲踹襪訪溪真仙容不老最牽興浮子無詩可對人静愛龍舒參眼識愁憐江總落歌塵榕風亭下畱連處悽慘荒荆忍放春凍影誰憐野外神疎疎淡淡自脩真㡬苞含白半凝淚一信清香太惱人風雨起予懐舊感江山悔我老紅塵角哀巳矣怕桃死此日空遺雪對春夢來曽憶二郎神花影愁端語最真月浸一庭寒水玉夢驚孤枕斷腸人不堪往事從頭看總欲新詩得句塵啄木敲門窺我醉四山寂寂鳥啼春憶昔君平勘卜神青衣應是日時真雲開巫女多嬌面浴出楊妃一麗人竹葉杯浮苔砌月豆荄灰暖紙窗塵驚春恐落羣芳後先到名園逐上春結綺吟餘暗愴神東昏猶自紀前真七哀有感驚愁眼一白空深惜幻人幽興逺迷葱嶺雪寒花清洗洛陽塵想應飛墜仙京去鈿合金釵誰寄春萬花同氣不同神玉粒孤標迥出真雪外驚看三五蕋山中知識㡬千人香還有分歸吟料影欲無眠效幻塵役損東君吾老矣可曽羞妒錦宫春遺情極像白拈神仙與吟翁意氣真月曉憶同林外飲酒醒愁悵曲中人荒溪獨照山初静寒影相持雪亦塵每惜半簷風露重起披玉毳伴瓊春紫微垣裏一魁神謫向蓬瀛領衆真十月具形分浩氣九靈司命註瓊人危根必露應知妄種智圓明不墮塵地位清髙太孤潔瓣香拜盡世間春廣宣筆法幾摹神妙得花中品格真點雪半粘風外蹟片烟横隔竹西人孤能入眼凉詩觀清欲飛空拭瘴塵憶到霜鐘趂粧飾年前年後為誰春朶中飛下玉霄神仙韻嬌姝一粉真冰曉浴乾銀浦水雪籬愁損草堂人名姬駿馬空詞筆廢苑荒臺老戰塵凍埜滄茫天四慘两行啼鴈獨傷春瞥聞香過欲飄神林迥風清水漾真空外忽來花鳥使雲端應占蕋宫人許瓊飛栢愁擎句弄玉排簫㸃落塵引領羣仙朝帝所大羅天上逺生春霜雪園林幾役神天憐吟客對空真一爐荀令香澄水半豓徐妃粉媚人愁絶不禁傷嵗暮情深渾斷怨風塵古根巳學蒼龍勢怪底嚴冬早發春黄埃滿眼正昏神愁見踈林㡬朶眞南國有香薰醉夣北風如陣戰覊人十分孤静偏宜曉一味清新不染塵痩島寒郊誰喚起坐間吟對玉堂春天開竒觀付詩神慘淡經營歳暮真傳説空中長記夢㶚陵醉裏半疑人逾年藏白應棲粉對雨聞香似隔塵失笑喬釗水芍藥空嫺妖冶鬬姸春嵐隂飛處暗迂神密吐孤芳自適真倒影欲窺臨水鏡斜枝似傍有情人海寧䕫峽幾清曉金谷銅駞一聚塵懐遠何須歎遲暮滿頭白髮且簪春一樽酬罷楚江神芳信冥冥欲受真總道無情還有思勿疑是影又非人雪消頓覺雲隨夢月落難聞笛怨塵最是客情眠不穩擁衾危坐黯愁春驂鸞駕鶴下三神病眼雖昏看亦眞霽曉一沉斜影月鈞天九奏歩虛人粉霜寒泣瓊闌淚蘭麝清飄素襪塵好似虹霓屏上景温泉宫裏各呈春騰騰天中放谷神羣仙騎鶴正朝眞淡烟絶色本何種入聖超凡只此人老大暗驚殘歳月寂寥空對古烟塵問渠橘隱應知否變作飛龍有㡬春花間一見上林神冷看烟霏半頰真手撚梢頭痕記月眠醒香外氣迷人濕雲不􅏒藏深碧殘雪初消盎暖塵羣木自知天意惜直從身後始争春御爐薰徹太羅神永夜横杓對七真浩刼罡風開梵氣清浮弱水度星人綠毛么鳯羽翻譜丹鼎胎禽跡化塵獨媚𤣥英長不老海桑知變㡬畨春月色微明誤變神綠臺弄粉記顔真要知翠羽空陳跡未必雞林曽化人孤恨逺看驚薄暮新詩故夢悵前塵凍蛟危立寒鱗甲縱有青錢不買春飛爽浮幽逞雪神空江烟浪自愁真本無世上傾城笑曽向軍前止渴人曝暖釀寒時逐蹟梳風洗雨意超塵山川凍斷精靈氣獨為殘年作好春妙向羣芳玩五神空中亹亹似怡真月天花地幾心事江國溪山一主人欲笑還愁羞解語乍來忽去眇逰塵芳姿不怕消磨盡半㸃温柔爾許春粉輕衣冷獨消神未許瓊花巧妒真一𣲖珠幢迎羽客半機冰織駐鮫人移將天上行霄魄化作樽前弄影塵惟共水曹標粉序臨風灑落兎園春螭身虬尾老形神吐出生枝色鬬真雲興欲乗逰剡棹露花應恨射鵰人宜風宜雨寒滋韻含怨含情曉沭塵一領年芳如赴約何須羯鼓更喧春困坐無端遣睡神忽來詩思欲升真逄君雪月䨇清侶老我風霜百感人身世飄零知有恨心腸冷淡暗羞塵從教物態隨年改日暮天寒不計春萬玉圍庭照萬神懶能短幅對斜真吟看庾嶺浮香意清壓巴山噀酒人月殿霜宫憐舞影冰崖蘚壁障浮塵望中或見胭脂雪一様情懐两様春不遮一葉露全神似見風流賀季真天與吟情開太古月兼清影恰三人寒欺雪岸有餘白清灑冰簷不到塵但見新題緇凍壁倚䦨畱看大家春五出堂堂奪衆神獨於静處見孤真栴檀國裏天然韻簷葡林中玉様人臈雪㡬回埋不死寒泉一點淨無塵世間萬物知多少敢向枯梢鬬早春綠窗深鎻筆頭神健歩移來影脱真風惜怡渠有清致平生喜我作幽人杏奴惟好曽前席礬弟髙風又雨塵忍向臨卭識杯酒一分牢落一分春清脩不做五方神烟外誰開半額真淚眼未晴寒滴乳白頭如雪老催人長天蒼莽増遺慨逺水㣲茫泯去塵安得唐昌重邂逅快鞭追騎玉峰春勒住霜林萬古神香根杳杳出花真巖隈弄月驚山鬼牆外迎風笑路人玉潔冰清宜抹素粉消骨朽不隨塵九英射隙光芒起元稹文章拍拍春縱有多情不亂神笑渠桃李乞餘真翠生寒袖愁籠月玉墜嬌雲酷傍人三十二天來隱韻幾千百刼入空塵壽陽去後遺風逺搔首含章一夢春痩倚踈籬出半神雪風吹面冷含真晴曛香素誰邉玉影暈冰簷若個人巳見狂蜂先採探肯隨夢蝶久成塵寒林忽忽東方白愁醒一瓢天地春海角天涯憶故神村村烟雨未逄真南寒北暖變騷體西沒東生逐往人幸有老坡衣鉢在空憐和靖屋簷塵集英記得曽逰地回首慈恩㸃點春尚無容色氣何神道力堅凝鐵鑄真受死忍寒憐老骨回光返照見孤人天孫巧約知誰測仙客清標不自塵半夜忽來雲外鶴蓬萊宫主闖先春收拾餘香薦肉神雲端隱隱見靈真館娃宮近鳯城暖綠萼堂深艮岳人曉角繁滋髙樹外寒姿消落碧天塵誠齋新有憑妖説驚㪚桃符句裏春幽爽玲瓏自悦神相逄渾欲問仙真水花晴涴湘妃淚露竹寒驚越地人風月夏盟千載上江天涼觀一時塵棑枝遂翠休疑似細咏昌黎雪共春有句安能泣鬼神孤鸞妙曲逐希真夜深痩影偏宜月雪後清香欲沁人東閣共來吟正苦西湖可往跡應塵功成調鼎君知否要使熈熈宇宙春花開臘底覺仙神一種靈根絶妙真五月熟成金彈子三冬蕋綻玉樓人龎公逺渉來推勘常老端然不惹塵箇様酸心誰委悉肯同雪曲與陽春梅花百詠附録
