body:
  text: 梅花百詠元馮子振釋明本撰古梅天植孤山幾百年名花分占逋翁先只今起草新栽樹後世相看亦復然和起如虬柏卧如槎猶吐冰霜度嵗華山月江風常是伴不知園館屬誰家老梅古樹槎牙鎖緑苔半生半死尚花開不須更問春深淺人道咸平手種來和種花年少負幽期厯遍風霜不計時顧我今居丈人行願遺清白䕃孫枝踈梅數個冰花三兩枝東風㸃綴特新竒黃昏照影臨清淺寫出林逋一句詩和依稀殘雪浸寒波桃李漫山奈俗何瀟灑最宜三二㸃好花清影不須多孤梅標格清高迥不羣自開自落傍無鄰天寒歲晏冰霜裏青眼相看有幾人和獨抱冰霜歲月深舊交松竹隔山林英姿孑立誰堪托惟有程嬰識此心瘦梅冰削輕肌雪削膚天然風致在清癯解知桃李難相匹祗為生來骨格粗和冰肌如削怯寒威天賦清羸可得肥我亦詩癯被花腦玉人渾欲不勝衣矮梅不放冰梢幾尺長怕分春色過鄰牆大材未必難為用禹殿雲深鎖棟梁和籬落盤根枕水坡月低清影舞婆娑青衣童子慳三尺花底相逄唱短歌蟠梅屈幹回枝製作新强施工巧媚陽春逋仙縱有心如鐵奈爾求竒揉矯人和鐵石芳條誰矯揉從教曲折抱天姿龍蛇影碎玲瓏月交錯難分南北枝新梅幾年雨露栽培得此度春風始著花為語東君加愛護要看老樹放橫斜和幼玉嬌姝欲效顰初花小試一年春花前明月無今古花下詩人非古人早梅從來花發先羣芳又向叢中獨擅場畢竟先開定先落爭如雪裏更馨香和攙先開遍向南枝不是清閒刻骨時好似洛陽年少客香腮霜雪上頭遲鴛鴦梅並蒂連枝朵朵雙偏宜照影傍寒塘只愁畫角驚吹散片影分飛最可傷和張澤民有律詩其首尾四句與此大同小異采采雙花對錦機翠禽同夢月交輝有情一處隨流水莫被風吹各自飛千葉梅密瓣重重玉作圍就中消息孰能窺待看水月澄明際髣佛觀音變現時和密攢玉瓣費神工什百春藏一朵中雪壓鮫綃花骨冷故教重疊護東風寒梅山中萬木凍欲折林下幽芳獨自香怪底孤根禁受得就中原有鐵心腸和北枝偏愛雪霜多無奈蜂媒凍損何一任玉奴呵手折芳心元自抱陽和蠟梅洗却鉛華扮道裝檀心淺露紫香囊從今宫額翻新樣變作眉間一㸃黃和金玉同盟破雪開清香異色滿瑶臺不因蜜滓將花染安得蜂黃㸃額來緑萼梅蕊珠宫裏小仙娃暫别椒房抑翠華底事塵緣猶未斷謫來人世作名花和翠袖籠寒映素肌靚粧仙子月中歸露香清逼瑶臺曉隱約青衣侍玉妃紅梅春風昨夜入南枝浹髓淪肌釋凍威和氣曉來無著處滿空散作彩雲飛和清標何事厭鉛華故染胭脂妬杏花幸得枝頭香髣佛不然流落作凡葩胭脂梅搗碎春風紅守宫花房芳信一時通漢庭佳麗三千女豔抹濃粧總是同和濃粧出色染芳林春入胚胎造化深非是玉顔凝酒暈也知紅粉有丹心粉梅玉妃手碾白硃砂散作春風六出花夜半月明霜露重滿襟清淚溼鉛華和玉容有似傅鉛華濃抹胭脂未足誇白靣何郎不須拭揚州清賞壓瓊花青梅紛紛衆口利餘甘之子胡為獨嗜酸滋味自緣清苦得傍人何必把眉攢和纍纍酸實釀餘春小摘枝頭可薦新之子深能保貞固中含天地發生仁黃梅青子初肥色半鮮緑隂深處壓枝懸日長幾陳亷纖雨正是江南四月天和青子才過遍緑隂轉頭紅綻又垂金未應功到和羮妙更為蒼生作大霖鹽梅宜改詠和羮梅滋味由來貴適勻五行兼備始為珍如何當日和羮命略不曽言甘苦辛和熬波翻雪子青青鼎鼐同登要適鈞何代無賢如傅說太羮不和味尤真未開梅重重椒萼護輕寒不放春心一㸃閒可是花房芳信晚故應緘密待春還和緘春蓓蕾冷含烟絳蠟封香信暗傳姑射怯寒猶掩袂眼前惟見蕊珠寒乍開梅土脉陽回氣候新椒房微露一分春想應未識君王靣猶自含羞效淺顰和曉粧初試薄寒侵漏泄春機想未深昨夜椒房花蕊小為誰索笑露芳心半開梅暖入南枝氣未勻笑含芳意待餘馨相看絶似瑶臺夜斜掩重門認不真和一片芳心早破寒踈英向暖㸃酥乾却愁爛漫成搖落春色平分正好看全開梅玉臉盈盈總是春都將笑色媚東君道人放鶴歸來晚月下看花似白雲和瓊姬小隊遍深宫滿面春生大笑中畢竟花房羞半掩一齊分付與東風落梅誰家吹笛苦悲凉斷却佳人鐵石腸回首淚痕看不得離情分付返魂香和風榭飛瓊舞遍時春初早賦惜花詩家童輕掃庭前雪莫遣香泥汚玉肌十月梅向暖攙先泄化機花開正屬小春時時人莫訝陽和早好向初爻畫上推和年年開占小春時㸃綴湖山景最宜造化流芳何太早無陽安得有南枝二月梅髙標曽占百花魁春半才開何太遲畢竟東君有深意等閒桃李莫相欺和臘蕊開遲到四陽丈人殿入少年場凡花一見應相妒肯對東風䀻海棠憶梅迢迢春信隔江南寂寂芳盟負嵗寒青鳥不來仙夢杳月明空自倚闌干和夜分明月是揚州尚有春風在樹頭莫怪當年何水部嵗寒心事與誰愁探梅聞道春還巳有期逺來花下立多時南枝覔遍無消息借問花神知不知和踏破溪邉一徑苔好山秀水少人來梅花開處憐無伴笑折新枝當酒杯尋梅行過野徑復溪橋踏雪相求豈憚遙何處藏春春不見惟聞風裏暗香飄和上春有約覔南枝水竹人家遍扣時一任灞橋風雪冷蹇驢破帽不因詩問梅一别羅浮幾度春嵗寒心事許誰論風清月白三更後更有何人同扣門和寄聲湖上舊花魁曽有逋仙行輩來青鳥經年芳信杳春風笑口為誰開索梅城南地暖花開早見說君家滿樹春昨夜雪寒詩思好一枝分贈苦吟人和幽探名花謝俗氛幾回東閣挹清芬掇來盆盎難為色萬玉枝頭早見分觀梅踏雪尋君一頃難山窗清夜喜盤桓花神應有心如鐵肯厭吾儕冷眼看和月下相逄認未真曉來標格愈精神林逋仙去芳盟冷誰是花前具眼人賞梅對花呵凍寫新吟吟罷還將酒自斟不比西園豓桃李等閒開落費千金和愛花終日對瓊林飽玩豪吟興趣深檀板金樽非樂事此心清白是知音評梅屈子騷經遺不録石湖芳譜漫俱收試憑西掖攀花手題向百花花上頭和月旦花前豈乏人風霜齒頰帶陽春江南野史餘芳論絶世清如古逸民歌梅白雪聲中玉樹春乘鸞姑射倚雲聽曲中縹眇不知處留得餘香繞翠屏和六片紅牙捧雪兒花前低唱怕花飛後庭玉樹空陳迹白雪一聲人聽稀友梅紅紫紛紛逞豓顔朝開暮落費追歡孤山自有花如玉能與幽人保嵗寒和三益堂前世外人嵗寒誰是舊雷陳知心千古惟松竹冷淡相交始見真寄梅逺憑春信問知音離恨何如隴水深不是江南無所有欲君同識嵗寒心和故人遙隔隴雲邉折玉傳香水驛寒江北江南重相憶只將春信報平安惜梅愛此幽姿清絶塵更憐嵗晚獨相親相看不忍輕攀折留取明年占上春和香銷泥汚意徘徊掠地回風玉作堆愁絶黃昏無一語怕看孤月上窗來夢梅何處仙逰夢覺遲羅浮山下赴春期一聲吹徹霜天角正是參橫斗轉時和玉笛聲飛江上樓芳魂驚曉動清愁覺來人問商巖下曽見和羮傅說不移梅新劚孤根手自栽荷鋤和雨破蒼苔寒窗嵗晚多清况直伴幽芳帶雪開和湖邉鋤月換根基玉樹重栽樹不知種竹當年遺法在須留宿土記南枝譜梅蘭蕙紛紛入楚辭孤芳獨有老逋知君今採托增新賦不負能詩杜拾遺和自古騷人雖著語何如宋璟獨知音祗緣彼此傍真操寫出平生鐵石心接梅殘幹花踈可奈何貞心空自抱陽和與君試換冰霜骨看取明年青子多和采玉金刀巧若神好枝分得續孤根待看夜雨蒼苔長幻出春風不見痕浴梅寒鎖椒房氣未勻一沾恩澤頓精神冰肌溼透渾無力絶勝華清得寵人和玉骨清寒凝雪痕金壺香水浸來溫餘波輕頮春風面應是新承雨露恩折梅素手分開庾嶺雲問花覓取一枝春隴頭驛使今無便留向山窗几上芬和殘雪輕搖攬素肌故人應說寄來遲花時先假調羮手選取東風第一枝剪梅手挽冰枝那忍摧莫教香雪涴蒼苔并刀輕斷稍頭玉笑引春風上鬢來和破玉并刀試手溫香凝雙股斷芳魂花隨燕尾輕分去不帶春風爪甲痕簪梅對雪看花可自由興來寧復為花羞臨風一笑烏紗側却勝黃花插滿頭和折玉臨風帶笑篸烏紗春滿酒厭厭少年莫訝頭如雪猶勝梨花壓帽簷粧梅當年㸃額偶成真别是宫中一段春贏得世間傳故事紛紛總是效顰人和五出風流拂靣輕㸃成宫額映花明覺來不用窺鸞鏡蝶粉蜂黃一洗清浸梅一本云旋汲澄泉滿瞻瓶一枝斜插置幽亭冰姿玉骨清如許隱隱風生入座馨旋汲溫泉養折枝冰花寒玉淨相宜從今借得恩波力㑹見青青結子時和插花貯水養天真瀟灑風標席上珍清曉呼童換新汲只愁凍合玉壺春别梅東風吹夢返湖山玉减香消怨夜寒畢竟明年又相見早將春信報平安和花對東風攪離思愁翻縞袂忍輕分月明相送臨溪水春樹遙憐隔暮雲咀梅旋摘冰英帶雪餐清分齒頰不知寒屈平若諳多風味未必專心嗜菊蘭和細嚼冰㽔齒頰馨詩脾冷沁有餘清靈均可惜不知味却向秋風餐落英羅浮梅憶昔山前花滿村月明曽扣酒家門青禽一去無消息冷落三生石上魂和髙卧花林醉復醒不知月落與參橫人生總是南柯夢獨有師雄一夢清庾嶺梅誰種霜根大庾巔地髙天近得春先枝南枝北元同幹何事東風亦有偏和星河漾影浸寒梢甘與孤松結故交庾老品題今寂寞蟠枝屈曲似潛蛟孤山梅逋翁老去句空傳寂寞林丘起暮煙惟有亭前數株玉自將開落度流年和種玉西湖獨占春逋仙佳句播清芬月明花落吟魂冷童子何之鶴守墳西湖梅蘇老堤邉玉一林六橋風月是知音任他桃李爭春色不為繁華易素心和花發蘇堤柳未煙主張風月小壺天清波照影紅塵外冷看逰人上畫船東閣梅官亭把酒送行旌對雪看花值早春杜老飄零頭白盡底須朝夕苦催人和元本闕此一首今考韋德圭集補之對雪蜀亭清興動因思何遜更多才倚闌人去花無主詩壁春深長緑苔江梅若有人兮湘水濵冷香和月浸黃昏自憐不入離騷譜待把芳心弔楚魂和尋香日日醉江邉更買扁舟花下眠酒醒潮生風力緊掀蓬無奈雪漫天山中梅巖谷深居養素貞嵗寒松竹淡相鄰孤根厯盡冰霜苦不識人間别有春和春在雲根竹裏家霜林煙麓乍藏遮隔溪杖履徘徊處祗見香來不見花清江梅湛湛澄波映月輝娟娟寒玉浸琉璃分明一幅鵝溪絹寫出當年楊補之和古樹煙籠碧玉流酒旗風徑暗香浮只今卧雪滄波上幾見看花人白頭溪梅古樹橫斜澗水邉野橋村市獨暄妍玉堂路杳無心到堪與漁翁繫釣船和香悄波寒月淡時山人散步水之湄一灣淺處卧蟾影欲畫欲吟心自知野梅花落花開春不管清風明月自綢繆天然一種孤髙性直是花中隱逸流和烟泊水昏江路迷香寒樹冷雪垂垂玉堂夢寐無心到絶似遺賢遁跡時逺梅羅浮山下度春風千里相思信未通安得移栽近茆屋繁花亂插向晴空和雪泥踏遍十餘里迢遞踈林接野橋何日移春歸院宇免教望斷玉人遙前村梅野老莊南天氣暖一枝常是占先春夜來幾陳東風迅時有清香暗襲人和竹外踈花花外橋托根聚落任風叨一從茆店吹香後踏雪來尋酒價髙漢宫梅飾玉含香立未央不將顔色事君王後來玉樹緣何事能使陳家怨國亡和玉破塵收迹巳陳劉郎從古惜芳春新粧日照明妃燕冷落長門拜月人宫梅素質蕭然林下風何年移植禁園中自從識得君王靣回首仙凡逈不同和長門月冷漏遲遲正是香愁粉怨時折得一枝無寄處翻思紅葉好題詩官梅武昌湖上千株柳何遜揚州幾樹花爭似故山幽徑側春風嵗嵗報新芽和螺牆蘚壁護蒼虬花落花開客去留誰是參軍最相憶迢迢從路到揚州廨舍梅却月凌風迹巳陳水曹詩句尚清新如今不獨揚州種江北江南總是春和種花官宇說揚州何遜多情憶舊逰二十四橋春暫歇玉簫吹雪小紅樓柳營梅亞夫才略動雄風手植冰花玉壘中不是將軍閒好事為渠止渴藉成功和花寨穿楊月掛弓霜飛玉帳帶春風緑隂止渴將軍老灞上應魁白戰功城頭梅一云藝梅將士興偏嘉樹樹芬芳郭外斜應是陽春公造化幾番雨露挹冰花止渴將軍築受降賸栽玉樹遍城隍天家雨露無私潤願布陽春被八荒和杖䇿尋芳近東郭女垣無月亦精神角聲吹徹霜天曉十萬人家總是春庭梅䦨干六曲護春風白雪生香滿院中夜靜月明么鳯下半窗踈影隔簾櫳和曲欄干外玉成行猶似當年虢國粧不是化工私冷豓自緣紅紫怯冰霜書窗梅雪冷香清夜誦時十年辛苦只花知天公有意分蟾桂先借東風第一枝和擬魁春榜冠瓊林對白抽黃幾夜深雪案香浮藝葉冷平生清苦此時心琴屋梅三弄花間小院深玉人遙聽動春心清聲彈落冰梢月喚起髙懷共賞音和花月寒窗彈白雪冷然寫出廣平心臨風三嗅還三弄清極香中太古音棋墅梅萬玉成林覆石枰兩翁相對適閒情東風忽遣花如雪絶似將軍入蔡城和孤山擬折東山屐白戰曹林望解圍妙斡神機先一㸃落花隨子鬬斜飛僧舍梅瀟灑叢林玉一枝宿根曽是悟禪機分明勘破羅浮夢特把緇衣換素衣和紫竹林中艾衲寒淨瓶曉折供金仙三生石上精魂在清夜靜參花月禪道院梅玉骨清癯半似仙一枝斜倚法壇前月明花下人朝斗依約瓊妃降九天和玉佩光寒白錦袍步虛人立月華髙赤松仙友如相問近日𤣥都不種桃茆舍梅昨夜春風入草堂籬根老樹發清香相思不必將詩寄却恐題詩㑹斷腸和數椽草屋延清客竹作踈籬護雪葩不是玉堂無分到且和明月寄山家簷梅儂家老樹臨書屋清夜看花睡不眠殘雪半消寒月上暗香和影度踈簾和不礙丁東敲玉佩小簷風韻屬黃昏分明半幅推篷畫只缺枝頭月一㾗釣磯梅渭川東畔春光早傍水幽花帶雪開一任風霜頭白盡不隨漁父出山來和蒼苔石上老烟波手把長竿倚玉柯閒繫孤舟明月下寒香一夜沁漁蓑樵徑梅窈窕若即溪上路幽花的皪倚榛叢飄零不為樓頭笛恨殺朝南暮北風和峻嶺孤芳吐未勻半欹山路半為薪帶將擔上來城市饒取春風賣與人蔬圃梅花發春畦菜甲新抽青配白喜知音芳魂也羡冰壺味來與先生話素心和剪韭春園香暗浮籬邉牆角試尋幽詩人一任花俱瘦只願民無菜色憂藥畦梅懶入春風桃李場董仙林下鬱清香不因青子能酸苦安得神農為品嘗和炎帝遺芳濟世珍園中百草讓先春調羮妙手能醫國不說當年種杏人盆梅新陶瓦缶勝瓊壺分得春風玉一株最愛寒窗閒讀處夜深燈影雪糢糊和月團香雪翠盆中小技能偷造化工長伴玉山頽錦帳不知門外有霜風雪梅北帝司權播令新天葩凡卉鬬精神化工不讓花神巧特與增添一樹春和五出花開六出飛玉肌寒擁素綃衣更看霽月同清白一夜窗前瘦影肥月梅暗香浮動正朦隴古樹橫斜淺水中清景滿前吟不就又移踈影過溪東和素娥姑射鬬嬋娟疏影分明不夜天散却廣寒宫裏桂春光常滿玉堂前風梅綽約肌膚不受吹飄香墮玉怕春知憑誰領取東君意傳語封家十八姨和花間少女剪春妍粲粲霓裳舞隊仙月夜遙看環珮冷莫教吹落玉花鈿烟梅瓊林浮翠淡朦朧遙望珠光隱現中一夜東風吹不散曉看渾似碧紗籠和夢隔梨雲逗曉紈苔枝浮翠泥春寒不嫌玉質籠輕素留與詩人冷淡看竹梅宜題曰竹林梅乘鸞姑射下羅浮鼓瑟湘妃出上逰邂逅江干話心曲冷香幽翠不勝愁和浪說松林有美人何如倚翠渭川濵嵗寒遮掩春風靣一日可能無此君杏梅宜題曰杏園梅頳顔相映小桃紅賴有清香辨異同夜靜鼓琴花樹下直疑身在孔壇中和董林驀地暗香傳淡淡紅芳照眼姸有客前村來問酒牧童誤指到花邉苔梅姑射仙人倚翠鸞濛濛香霧濕飛翰夜深舞罷霓裳落留得葱裙護曉寒和古貌蒼然鶴膝枝土花生暈護春機玉堂試看青袍客莫忘江南有白衣照水梅玉樹臨流雪作堆寒光踈影共徘徊多情最是黃昏月配合春風不用媒和一泓映出兩南枝髣佛明粧對鏡時波面浮香天作底芳魂浴雪影娥池水竹梅寒流浸玉映疏林翠袖綃裳冷不禁不向此中清淺處誰能照見兩君心和波涵修翠玉玲瓏院落清幽自不同冷浸湘雲帶疏影一般瀟灑月明中水月梅浮玉溪邉夜未期暗香踈影靜相宜一時意味無人識只有咸平處士知和淺碧籠蟾蘸玉痕乾坤清沁鏡中春黃昏照影成三絶縱有華光寫不真杖頭梅短笻挑酒過西湖折得冰梢傍玉壺日暮醉歸山路險風流不待倩人扶和玉鳩橫影暗香飄絶勝江行掛酒瓢雪擁吟肩兩清瘦一枝挑月過溪橋擔上梅有客孤山弔鶴歸半肩行李插踈梅街頭兒女不解事剛道賣花人巳回和蜂蝶隨人紫陌賒挑將春色向誰家若逄公子休輕售不比街頭賣杏花隔簾梅玉堂咫尺有神仙翠箔籠春信不傳日暮相思雲樹杳一泓秋水自娟娟和庭花映箔眩吟眸一片湘雲鎖暮愁風捲黃昏踈影動珊瑚枝上月如鈎照鏡梅粧閣開奩對曉寒菱花影裏雪團團素鸞舞罷却飛去留得芳容正面看和銅瓶養素近粧臺一照芳心對面開應是嫦娥厭丹桂換將踈影月中來玉笛梅五月江城草木焦斷腸聲裏落英飄至今黃鶴樓頭怨千古令人恨不消和誰家瓊管奏春風吹落江花曲未終黃鶴樓空人不見一聲聲在月明中水墨梅烏府先生節操剛筆端凛凛綴冰霜不因面目顔如許誰信於中有鐵腸和香銷南國雲愁地影落西湖月暗天回首玉堂春夢杳一涵黑雨起龍眠畫紅梅瓊林宴罷醉糢糊霞臉生香美且都却恐醒來顔色改春風染作折枝圖和一夜花房賜守宫丹青誰為寫緋容却疑卯酒傷多後綃帳春寒睡正濃紙帳梅溪藤十幅簇春溫時有清香入夢魂多少羅幃好風月不知消得幾黃昏和春融剡雪道人家素幅凝香四面遮明月滿牀清夢覺白雲影裏見踈花元翰林馮海粟作梅花百詠以索中峯禪師和章師談笑間不踰日而盡答之二公真梅花知己也今其詩裁冰鏤雪慕繪入神而逸韻藻思實堪伯仲于肅愍詩所稱海粟俊才應絶世中峯道韻不嬰塵者豈虛語哉和靖句不獨專美於前矣又有韋德圭集雖亦百首然八九皆中峯作而履靖所和百首則扯曵枯淡不堪與二公滌硯矣兹悉棄去止取二帙讎校而彚集之為梅花譜韻焉但中峯集獨闕東閣一題而韋集有之則偶逸於此而適存於彼信珠璣咳唾不容遺棄人間也爰為補入以成全璧仍俟考訂云海豫所見二公詩各有别本中峯集特字句偶異而粟則有全首俱非者今細為研證蓋出於不解事者之妄改耳如矮梅詩云大材未必難為用禹殿雲深鎖棟梁蓋大禹廟中有梅梁馮正用此乃改云鎖杏梁豈以相如長門賦有飾文杏以為梁句耶與此何涉耶庚嶺梅詩云枝南枝北元同幹何事東風亦有偏蓋庾嶺梅南枝已落北枝方開有寒暖之異故托遺梅花詩南枝向暖北枝寒一種春風有兩般正此意乃改云幾陳東風玉蕊姸何以與元同幹相照耶江梅詩云自憐不入離騷譜待把芳心弔楚魂蓋離騷備言蘭蕙蓉菊等花而不及梅故云然乃改云不入繁華境何以與弔楚魂相照耶遠梅詩云何日移栽近茆屋繁華亂插向晴空蓋用杜詩安得健步移逺梅亂插繁華向晴吳乃改云芳枝清馥散晴空何耶廨舍梅詩云却月凌風迹巳陳水曹詩句尚清新蓋枝橫却月觀花繞凌風臺正何遜本詩也乃改云向日迎風繞檻陳則陳字當作何解耶且何以與尚清新相照耶夫此數詩者用事典確曉然可據而率意妄改殊堪捧腹其他字句之拙贅者更不可枚舉本與履靖和詩同刻疑即履靖所改今觀其和東閣梅詩云何遜當年愛藝梅日登東閣手擎杯夫東閣官梅動詩興還如何遜在揚州此杜甫因斐迪寄詩而及遜非遜事也又觀其補隴頭梅云逝水滔滔不復西隴頭驛使路無稽夫折梅逄驛使寄與隴頭人此陸凱寄梅贈范曄詩也時凱居江南曄居長安則梅寄隴頭人非隴頭有梅也今錯誤若此豈非不解事者乎則履靖之詩可知矣馮詩之為履靖所改抑又可知矣豫惟從元本稍參校之而附記之如此夏洪基識梅花百詠
