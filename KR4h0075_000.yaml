body:
  text: 梅花百詠總集類提要臣等謹案梅花百詠一巻附録一巻元馮子振與釋明本倡和詩也子振字海粟攸州人官承事郎集賢待制以博學英詞有名于時明本號中峰錢塘人住鴈蕩村姓孫氏出家呉山聖水寺得法于髙峰原妙禪師屢辭名山主席屏跡自放時趙孟頫與明本友善子振意輕之一日孟頫偕明本往訪子振子振出示梅花百詠詩明本一覽走筆和成復出所作九字梅花歌以示子振遂與定交是編所載七絶百首即當時所立和者是也後又附春字韻七律一百首則僅有明本和章而子振原唱已不可復見矣宋史藝文志載李綨梅花百詠一巻久佚弗傳子振復創為之才思奔放往往能出竒制勝而明本所和亦頗琱鏤盡致足稱合璧聨珪今明本所著中峯廣録傳本甚尠而子振著作則惟元文類諸書畧見一二全集久已湮沒無存此集雖㳺戲之作而半爪一鱗猶可以窺見崖畧其詩别本互有同異東閣梅一首中峯和章原闕而别見于韋德珪集國朝夏洪基為之訂正校刋頗有依據今亦並仍之焉乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4eec80ef269e4a1d3fe62a229ba84079aabe99e81110dce641531e33f09f5efa
